name: Update Gold Price
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Price & Track Opening
        run: |
          echo "Fetching latest gold price..."
          curl -s -H "Cache-Control: no-cache" -H "Pragma: no-cache" \
               -A "AlongkornShop-Bot/1.0 (+https://github.com/${{ github.repository }})" \
               "https://api.chnwt.dev/thai-gold-api/latest?t=$(date +%s)" > latest_gold_new.json
          
          if grep -q "success" latest_gold_new.json; then
            # Extract date and time/round information
            NEW_DATE=$(cat latest_gold_new.json | jq -r '.response.update_date')
            NEW_TIME=$(cat latest_gold_new.json | jq -r '.response.update_time')
            
            # Check if we need to update daily_opening.json
            UPDATE_OPENING=false
            if [ ! -f daily_opening.json ]; then
              UPDATE_OPENING=true
            else
              OLD_DATE=$(cat daily_opening.json | jq -r '.response.update_date' 2>/dev/null || echo "")
              if [ "$NEW_DATE" != "$OLD_DATE" ] || [[ "$NEW_TIME" == *"(ครั้งที่ 1)"* ]]; then
                UPDATE_OPENING=true
              fi
            fi
            
            if [ "$UPDATE_OPENING" = true ]; then
              echo "Setting new daily opening price for $NEW_DATE ($NEW_TIME)"
              cp latest_gold_new.json daily_opening.json
            fi
            
            mv latest_gold_new.json latest_gold.json
            echo "{\"last_sync\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > last_sync.json
          else
            echo "::error::API Error: Invalid response"
            exit 1
          fi

      - name: Commit and Force Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git add latest_gold.json daily_opening.json last_sync.json
          
          # Force push to keep the history clean (only 1 "Sync" commit)
          # This avoids repository bloat over time
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          git commit --amend -m "Auto-sync: Gold Price Updated at $TIMESTAMP" || git commit -m "Auto-sync: Gold Price Updated at $TIMESTAMP"
          git push --force
