name: Update Gold Price
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Fetch Price & Update Sync
        run: |
          # ดึงราคาทองล่าสุด พร้อมใส่ Cache Buster และ Headers ป้องกัน Cache
          curl -s -H "Cache-Control: no-cache" -H "Pragma: no-cache" \
               -A "AlongkornShop-Bot/1.0 (+https://github.com/${{ github.repository }})" \
               "https://api.chnwt.dev/thai-gold-api/latest?t=$(date +%s)" > latest_gold_new.json
          
          # ตรวจสอบว่าไฟล์ไม่ว่างและเป็น JSON ที่ถูกต้อง (มีคำว่า success)
          if grep -q "success" latest_gold_new.json; then
            mv latest_gold_new.json latest_gold.json
            # บันทึกเวลาที่เช็คล่าสุด (ISO Format) เพื่อให้ระบบมีการ Push ทุก 5 นาที
            echo "{\"last_sync\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > last_sync.json
          else
            echo "Error: Invalid API response"
            exit 1
          fi
          
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add latest_gold.json last_sync.json
          git commit -m "Update gold price & sync status" || exit 0
          git push
