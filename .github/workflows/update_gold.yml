name: Update Gold Price
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Price & Update Sync
        run: |
          echo "Fetching latest gold price..."
          # Fetch with cache buster and custom user agent
          curl -s -H "Cache-Control: no-cache" -H "Pragma: no-cache" \
               -A "AlongkornShop-Bot/1.0 (+https://github.com/${{ github.repository }})" \
               "https://api.chnwt.dev/thai-gold-api/latest?t=$(date +%s)" > latest_gold_new.json
          
          # Validate JSON structure (must contain 'success')
          if grep -q "success" latest_gold_new.json; then
            echo "API Success: Updating files."
            mv latest_gold_new.json latest_gold.json
            # Use UTC ISO format for sync timestamp
            echo "{\"last_sync\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > last_sync.json
          else
            echo "::error::API Error: Invalid response from thai-gold-api"
            cat latest_gold_new.json
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Only add if files changed (though last_sync.json always changes)
          git add latest_gold.json last_sync.json
          
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          if git commit -m "Auto-sync: Gold Price Updated at $TIMESTAMP" ; then
            echo "Changes detected and committed."
            git push
          else
            echo "No changes to commit."
          fi
