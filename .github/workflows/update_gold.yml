name: Update Gold Price

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: gold-price-updater
  cancel-in-progress: true

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch & Normalize
        run: |
          python3 << 'EOF'
          import urllib.request, json, datetime, time, random, os

          def fetch(url, headers):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=10) as r:
                  return json.loads(r.read().decode())

          def fmt(x):
              return f"{float(x):,.2f}"

          def transform_goldtraders(data):
              as_time = datetime.datetime.fromisoformat(data["asTime"])
              thai_year = as_time.year + 543
              return {
                  "status": "success",
                  "response": {
                      "update_date": as_time.strftime(f"%d/%m/{thai_year}"),
                      "update_time": f"เวลา {as_time.strftime('%H:%M')} น. (ครั้งที่ {data['seq']})",
                      "price": {
                          "gold": {
                              "buy": fmt(data["oM965_BuyPrice"]),
                              "sell": fmt(data["oM965_SellPrice"])
                          },
                          "gold_bar": {
                              "buy": fmt(data["bL_BuyPrice"]),
                              "sell": fmt(data["bL_SellPrice"])
                          }
                      }
                  }
              }

          def transform_chnwt(data):
              return {
                  "status": "success",
                  "response": data["response"]
              }

          # ✅ random delay กัน bot detect
          delay = random.uniform(0.5, 1.5)
          print(f"Sleeping {delay:.2f}s before request...")
          time.sleep(delay)

          final = None

          try:
              raw = fetch(
                  "https://www.goldtraders.or.th/api/GoldPrices/Latest",
                  {"User-Agent": "Mozilla/5.0"}
              )
              final = transform_goldtraders(raw)
              print("Primary OK")
          except Exception as e:
              print("Primary failed:", e)
              try:
                  raw = fetch(
                      "https://api.chnwt.dev/thai-gold-api/latest",
                      {"User-Agent": "GoldBot/1.0"}
                  )
                  final = transform_chnwt(raw)
                  print("Fallback OK")
              except Exception as e2:
                  print("Fallback failed:", e2)

          if final:
              # ✅ เช็คว่า update_time ซ้ำไหม
              new_time = final["response"]["update_time"]
              new_date = final["response"]["update_date"]

              old_time = None
              if os.path.exists("latest_gold.json"):
                  with open("latest_gold.json", "r", encoding="utf-8") as f:
                      try:
                          old = json.load(f)
                          old_time = old["response"]["update_time"]
                      except:
                          pass

              if new_time == old_time:
                  print("Same update_time → skip write")
              else:
                  with open("latest_gold.json", "w", encoding="utf-8") as f:
                      json.dump(final, f, ensure_ascii=False, indent=2)
                  print("Updated latest_gold.json")

                  # ✅ เช็คว่าเป็นข้อมูลเปิดตลาดครั้งที่ 1 ของวัน หรือข้ามวันใหม่
                  is_first_of_day = "(ครั้งที่ 1)" in new_time
                  daily_old_date = None
                  
                  if os.path.exists("daily_opening.json"):
                      with open("daily_opening.json", "r", encoding="utf-8") as f:
                          try:
                              daily_old = json.load(f)
                              daily_old_date = daily_old["response"]["update_date"]
                          except:
                              pass
                              
                  if is_first_of_day or new_date != daily_old_date:
                      with open("daily_opening.json", "w", encoding="utf-8") as f:
                          json.dump(final, f, ensure_ascii=False, indent=2)
                      print("Updated daily_opening.json")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add latest_gold.json daily_opening.json || true
          if git diff --cached --quiet; then
            echo "No change"
          else
            git commit -m "Update gold price $(date +'%H:%M')"
            git push
          fi
