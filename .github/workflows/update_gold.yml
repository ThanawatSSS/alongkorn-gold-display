name: Update Gold Price
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Fetch Price & Update Sync
        run: |
          # ดึงราคาทองล่าสุด
          curl -s https://api.chnwt.dev/thai-gold-api/latest > latest_gold.json
          # บันทึกเวลาที่เช็คล่าสุด (ISO Format) เพื่อให้ระบบมีการ Push ทุก 5 นาที
          echo "{\"last_sync\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > last_sync.json
          
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add latest_gold.json last_sync.json
          git commit -m "Update gold price & sync status" || exit 0
          git push
