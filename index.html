<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="refresh" content="1800">

<title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    background-color: #800000;
    background-image: linear-gradient(#800000, #5a0000);
    color: #FFFFFF;
    font-family: Arial, Helvetica, Tahoma, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
}

.main-table {
    display: table;
    width: 100%;
    height: 100%;
    border-spacing: 10px 5px;
}

.main-row { display: table-row; }

.left-col {
    display: table-cell;
    vertical-align: middle;
    width: 60%;
    background-color: #4A0000;
    border: 5px solid #FFD700;
    border-radius: 20px;
    padding: 10px 20px;
}

.right-col {
    display: table-cell;
    vertical-align: middle;
    width: 40%;
}

/* HEADER */
.shop-header {
    border-bottom: 2px solid #FFD700;
    padding-bottom: 5px;
    margin-bottom: 10px;
}

.shop-logo {
    width: 100px;
    height: 100px;
    vertical-align: middle;
}

.shop-name {
    display: inline-block;
    font-size: 44px;
    color: #FFD700;
    font-weight: bold;
    margin-left: 15px;
    vertical-align: middle;
}

/* HERO */
.hero-label {
    font-size: 28px;
    margin-bottom: 10px;
    font-weight: bold;
}

.hero-price {
    font-size: 110px;
    color: #FFD700;
    font-weight: bold;
    line-height: 1;
    text-shadow: 4px 4px 0 #000;
}

.hero-unit {
    font-size: 32px;
    color: #FFD700;
    margin-left: 10px;
}

/* DIFF */
.diff-tag {
    font-size: 28px;
    margin-top: 15px;
    padding: 8px 35px;
    background-color: #000;
    border-radius: 50px;
    border: 3px solid #FFD700;
}

/* RIGHT */
.asso-card {
    background-color: #000;
    border: 3px solid #FFD700;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
}

.asso-label { font-size: 24px; color: #CCC; }
.asso-price { font-size: 60px; color: #FFD700; }

/* STATUS */
.status-footer {
    margin-top: 10px;
    font-size: 18px;
}

.clock-display { font-size: 24px; }

.refresh-btn {
    background-color: #FFD700;
    color: #000;
    border: 2px solid #000;
    padding: 12px 40px;
    font-size: 22px;
    font-weight: bold;
    border-radius: 10px;
    margin-top: 10px;
}

.price-up { color: #00FF66; }
.price-down { color: #FF4444; }
.price-equal { color: #FFFFFF; }
</style>
</head>

<body>

<div class="main-table">
<div class="main-row">

<div class="left-col">
<div class="shop-header">
<img src="logo_no_bg.png" class="shop-logo">
<div class="shop-name">ร้านทองอลงกรณ์</div>
</div>

<div class="hero-label">ราคาขายออกหน้าร้าน (รวมกำเหน็จ)</div>

<div>
<span id="shop-sell" class="hero-price">---</span>
<span class="hero-unit">บาท</span>
</div>

<div id="diff-info" class="diff-tag">รอข้อมูล...</div>

<div id="update-info" style="margin-top:10px;"></div>

</div>

<div class="right-col">

<div class="asso-card">
<div class="asso-label">สมาคมฯ รับซื้อ</div>
<div id="asso-buy" class="asso-price">---</div>
</div>

<div class="asso-card">
<div class="asso-label">สมาคมฯ ขายออก</div>
<div id="asso-sell" class="asso-price">---</div>
</div>

<div class="status-footer">
<div id="clock" class="clock-display"></div>

<div id="sync-status"></div>

<button class="refresh-btn" onclick="location.reload();">⟳ REFRESH</button>
</div>

</div>

</div>
</div>

<script>
function formatNumber(num){
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",");
}

function updateClock(){
    var d=new Date();
    var h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
    h=h<10?'0'+h:h;
    m=m<10?'0'+m:m;
    s=s<10?'0'+s:s;
    document.getElementById('clock').innerHTML=h+':'+m+':'+s+' น.';
}
setInterval(updateClock,1000);
updateClock();

function fetchData(){
    var xhr=new XMLHttpRequest();
    xhr.open('GET','latest_gold.json?v='+new Date().getTime(),true);
    xhr.onreadystatechange=function(){
        if(xhr.readyState==4 && xhr.status==200){
            var data=JSON.parse(xhr.responseText);
            var res=data.response;

            var buy=parseFloat(res.price.gold_bar.buy.replace(/,/g,''));
            var sell=parseFloat(res.price.gold_bar.sell.replace(/,/g,''));
            var shop=sell+1450;

            document.getElementById('asso-buy').innerText=formatNumber(buy);
            document.getElementById('asso-sell').innerText=formatNumber(sell);
            document.getElementById('shop-sell').innerText=formatNumber(shop);

            var cleanTime = res.update_time.replace('เวลา ', '');

            document.getElementById('update-info').innerHTML =
              'อัปเดต: ' + res.update_date + ' ' + cleanTime;

            var now=new Date();
            var h=now.getHours(),m=now.getMinutes();
            h=h<10?'0'+h:h;
            m=m<10?'0'+m:m;

            document.getElementById('sync-status').innerHTML=
              '<span style="color:#00FF00;">●</span> เชื่อมต่อล่าสุด '+h+':'+m+' น.';
        }
    };
    xhr.send();
}

setInterval(fetchData,10000);
fetchData();
</script>

</body>
</html>
