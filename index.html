<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <link rel="preload" href="./latest_gold.json" as="fetch">
    <meta http-equiv="refresh" content="1800">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>
    <style>
        /* Legacy CSS Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        font-family: Arial, Helvetica, Tahoma, sans-serif;

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* ห้ามมี Scrollbar เด็ดขาด */
        }

        body {
            background-color: #800000; /* สีแดงเข้มพื้นฐาน */
            color: #FFFFFF;
            font-family: 'Arial', 'Helvetica', 'Tahoma', sans-serif;
            text-align: center;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 
           ใช้ Table Layout เพื่อบังคับการวางตัว 2 คอลัมน์ 
           ซึ่งเป็นวิธีที่เสถียรที่สุดในเบราว์เซอร์ทีวีรุ่นเก่าครับ 
        */
        .main-table {
            display: table;
            width: 100%;
            height: 100%;
            border-spacing: 15px;
            table-layout: fixed;
        }

        .main-row {
            display: table-row;
        }

        .left-col {
            display: table-cell;
            vertical-align: middle;
            width: 60%;
            background-color: #4A0000;
            border: 5px solid #FFD700;
            border-radius: 20px;
            padding: 20px;
        }

        .right-col {
            display: table-cell;
            vertical-align: middle;
            width: 40%;
            padding-left: 10px;
        }

        /* Header ในฝั่งซ้าย */
        .shop-header {
            border-bottom: 2px solid #FFD700;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .shop-logo {
            width: 80px;
            height: 80px;
            vertical-align: middle;
        }

        .shop-name {
            display: inline-block;
            font-size: 36px;
            color: #FFD700;
            font-weight: bold;
            margin-left: 15px;
            vertical-align: middle;
        }

        /* ราคาหลัก */
        .price-hero-container {
            margin: 20px 0;
        }

        .hero-label {
            font-size: 28px;
            color: #FFFFFF;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .hero-price {
    font-size: 110px;
    color: #FFD700;
    font-weight: bold;
    line-height: 1.1;

    text-shadow: 
        3px 3px 0 #000,
        0 0 10px rgba(255,215,0,0.3);
}

        .hero-unit {
            font-size: 32px;
            color: #FFD700;
            font-weight: bold;
            margin-left: 10px;
        }

        .diff-tag {
    font-size: 28px;
    font-weight: bold;
    margin-top: 15px;
    display: inline-block;
    padding: 8px 35px;
    background-color: #000000;
    border-radius: 50px;
    border: 2px solid #FFD700;

    text-shadow: 1px 1px 0 #000;
}

        /* รายละเอียดฝั่งขวา */
        .asso-card {
    background-color: #000000;
    border: 3px solid #FFD700;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;

    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

        .asso-label {
            font-size: 24px;
            color: #CCCCCC;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .asso-price {
            font-size: 50px;
            color: #FFD700;
            font-weight: bold;
        }

        /* Footer & Status */
        .status-footer {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }

        .clock-display {
            font-size: 24px;
            color: #FFFFFF;
            margin-bottom: 5px;
        }

        .sync-info {
            font-size: 14px;
            color: #00FF00;
            margin-top: 5px;
        }

        .refresh-btn {
    background-color: #FFD700;
    color: #000000;
    border: 2px solid #000;
    padding: 10px 30px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;

    box-shadow: 2px 2px 0 #000;
}

        .price-up { color: #00FF66; }
        .price-down { color: #FF4444; }
        .price-equal { color: #FFFFFF; }

        /* Hidden Log */
        #debug-log { display: none; }
    </style>
</head>
<body>
    <div class="main-table">
        <div class="main-row">
            <!-- คอลัมน์ซ้าย: โลโก้ และ ราคาขายหน้าร้าน -->
            <div class="left-col">
                <div class="shop-header">
                    <img src="logo_no_bg.png" alt="ALONGKORN" class="shop-logo">
                    <div class="shop-name">ร้านทองอลงกรณ์</div>
                </div>

                <div class="price-hero-container">
                    <div class="hero-label">ราคาขายออกหน้าร้าน (รวมกำเหน็จ)</div>
                    <div>
                        <span id="shop-sell" class="hero-price">---</span>
                        <span class="hero-unit">บาท</span>
                    </div>
                    <div id="diff-info" class="diff-tag">รอข้อมูล...</div>
                </div>

                <div id="update-info" style="font-size: 20px; color: #BBB; margin-top: 10px;"></div>
                <div id="time-ago-info" style="font-size: 18px; color: #888;"></div>
            </div>

            <!-- คอลัมน์ขวา: ราคาสมาคมฯ และ สถานะ -->
            <div class="right-col">
                <div class="asso-card">
                    <div class="asso-label">สมาคมฯ รับซื้อ</div>
                    <div id="asso-buy" class="asso-price">---</div>
                </div>

                <div class="asso-card">
                    <div class="asso-label">สมาคมฯ ขายออก</div>
                    <div id="asso-sell" class="asso-price">---</div>
                </div>

                <div class="status-footer">
                    <div id="clock" class="clock-display">---</div>
                    <div id="sync-status">🟢 เชื่อมต่อปกติ</div>
                    <div id="heartbeat-text" style="font-size: 14px; color: #888; margin-top: 5px;"></div>
                    <button class="refresh-btn" onclick="location.reload();">⟳ REFRESH</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        // ฟังก์ชันฟอร์แมตตัวเลข (Legacy JS)
        function formatNumber(num) {
            if (!num) return '---';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // อัปเดตนาฬิกา
        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? '0'+h : h; m = m < 10 ? '0'+m : m; s = s < 10 ? '0'+s : s;
            document.getElementById('clock').innerHTML = h + ':' + m + ':' + s + ' น.';
        }

        // ระบบ Real-time Fetch
        var fetchTimer = 10;
        var openingData = null;

        function updateHeartbeat() {
            fetchTimer--;
            if (fetchTimer <= 0) {
                fetchTimer = 10;
                fetchData();
            }
            document.getElementById('heartbeat-text').innerText = 'ตรวจราคาอีกครั้งใน ' + fetchTimer + ' วินาที';
        }

        function fetchData() {
            // 1. ดึงราคาทองเปิดตลาด (ดึงครั้งเดียวหรือดึงซ้ำเพื่อความชัวร์)
            var openingXhr = new XMLHttpRequest();
            openingXhr.open('GET', './daily_opening.json?v=' + new Date().getTime(), true);
            openingXhr.onreadystatechange = function() {
                if (openingXhr.readyState === 4 && openingXhr.status === 200) {
                    try { openingData = JSON.parse(openingXhr.responseText); } catch (e) {}
                }
            };
            openingXhr.send();

            // 2. ดึงราคาทองล่าสุด
            var xhr = new XMLHttpRequest();
            xhr.open('GET', './latest_gold.json?v=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try { renderData(JSON.parse(xhr.responseText)); } catch (e) {}
                }
            };
            xhr.send();

            // 3. ดึงสถานะเชื่อมต่อ (Sync Status)
            var syncXhr = new XMLHttpRequest();
            syncXhr.open('GET', './last_sync.json?v=' + new Date().getTime(), true);
            syncXhr.onreadystatechange = function() {
                if (syncXhr.readyState === 4 && syncXhr.status === 200) {
                    try {
                        var s = JSON.parse(syncXhr.responseText);
                        var lastSyncDate = new Date(s.last_sync);
                        var timeStr = lastSyncDate.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                        document.getElementById('sync-status').innerHTML = '<span style="color:#00FF00;">●</span> เชื่อมต่อล่าสุด: ' + timeStr + ' น.';
                    } catch (e) {
                        document.getElementById('sync-status').innerHTML = '<span style="color:#FFD700;">●</span> กำลังรอข้อมูล...';
                    }
                } else if (syncXhr.readyState === 4 && syncXhr.status !== 200) {
                    document.getElementById('sync-status').innerHTML =  '<span style="color:#FF0000;">●</span> ไม่สามารถดึงสถานะล่าสุดได้';
                }
            };
            syncXhr.send();
        }

        function renderData(data) {
            if (data.status === 'success') {
                var res = data.response;
                var prices = res.price.gold_bar;
                var buy = parseFloat(prices.buy.replace(/,/g, ''));
                var sell = parseFloat(prices.sell.replace(/,/g, ''));
                var shopSale = sell + 1450;
                
                document.getElementById('asso-buy').innerText = formatNumber(buy);
                document.getElementById('asso-sell').innerText = formatNumber(sell);
                document.getElementById('shop-sell').innerText = formatNumber(shopSale);
                
                // คำนวณส่วนต่างจากราคาเปิดตลาด
                var diffEl = document.getElementById('diff-info');
                if (openingData && openingData.response) {
                    var openSell = parseFloat(openingData.response.price.gold_bar.sell.replace(/,/g, ''));
                    var currentSell = sell;
                    var diffValue = currentSell - openSell;
                    
                    if (diffValue > 0) {
                        diffEl.innerHTML = '<span class="price-up">▲ วันนี้ขึ้น ' + formatNumber(diffValue) + ' บาท</span>';
                    } else if (diffValue < 0) {
                        diffEl.innerHTML = '<span class="price-down">▼ วันนี้ลง ' + formatNumber(Math.abs(diffValue)) + ' บาท</span>';
                    } else {
                        diffEl.innerHTML = '<span class="price-equal">- ราคาเท่าตอนเปิดตลาด -</span>';
                    }
                } else {
                    diffEl.innerHTML = '<span class="price-equal">- กำลังคำนวณส่วนต่าง... -</span>';
                }

                document.getElementById('update-info').innerHTML = 'สมาคมอัปเดต: ' + res.update_time;
                calculateTimeAgo(res.update_time);
            }
        }

        var lastTime = "";
        function calculateTimeAgo(timeStr) {
            if (timeStr) lastTime = timeStr;
            if (!lastTime) return;
            var now = new Date();
            var m = lastTime.match(/(\d{1,2})[:.](\d{1,2})/);
            if (!m) return;
            var h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
            var d = new Date(now.getTime()); d.setHours(h, mi, 0, 0);
            if (d > now) d.setDate(d.getDate() - 1);
            var diffMs = now.getTime() - d.getTime();
            var diff = Math.floor(diffMs / 60000);
            var el = document.getElementById('time-ago-info');
            if (diff < 1) el.innerText = 'อัปเดตเมื่อครู่นี้';
            else el.innerText = 'อัปเดตเมื่อ ' + diff + ' นาทีที่แล้ว';
        }

        // เริ่มต้นการทำงาน
        if (!window._init) {
    window._init = true;
    setInterval(updateClock, 1000);
    setInterval(updateHeartbeat, 1000);
}
        fetchData();
    </script>
</body>
</html>
