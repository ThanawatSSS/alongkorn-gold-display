<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="refresh" content="1800">

<title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    background-color: #3b0000;
    background-image: linear-gradient(135deg, #4A0000, #1a0000);
    color: #FFFFFF;
    font-family: Arial, Helvetica, Tahoma, sans-serif;
}

/* Layout Wrapper - Table Display for Old TV support! */
.main-table {
    display: table;
    width: 96%;
    height: 94%;
    margin: 2% auto; /* Centers the whole table horizontally with gap */
    border-spacing: 40px 0px; /* Creates the gap between the columns */
}

.main-row {
    display: table-row;
}

/* LEFT COLUMN */
.left-col {
    display: table-cell;
    width: 48%;
    vertical-align: middle;
    text-align: center;
    background-color: rgba(0, 0, 0, 0.4);
    border: 5px solid #FFD700;
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
}

.shop-header {
    margin-bottom: 20px;
}

.shop-logo {
    width: 140px;
    height: 140px;
    vertical-align: middle;
    margin-bottom: 15px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

.shop-name {
    font-size: 48px;
    color: #FFD700;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    display: block;
}

/* DIFF */
.diff-tag {
    font-size: 32px;
    margin-top: 15px;
    padding: 15px 40px;
    background-color: #000;
    border-radius: 50px;
    border: 3px solid #FFD700;
    display: inline-block;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

/* UPDATE INFO */
#update-info {
    margin-top: 30px;
    font-size: 22px;
    color: #DDDDDD;
}

/* RIGHT COLUMN */
.right-col {
    display: table-cell;
    width: 48%;
    vertical-align: middle;
}

.asso-card {
    display: block;
    background-color: rgba(0, 0, 0, 0.5);
    border: 4px solid #FFD700;
    border-radius: 20px;
    padding: 25px 35px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    margin-bottom: 25px;
    text-align: left;
}

.asso-label {
    display: block;
    font-size: 28px;
    color: #DDDDDD;
    margin-bottom: 10px;
}

.price-row {
    display: block;
}

.asso-price {
    font-size: 100px;
    color: #FFD700;
    font-weight: bold;
    line-height: 1;
    text-shadow: 4px 4px 6px rgba(0,0,0,0.8);
}

.asso-unit {
    font-size: 30px;
    color: #FFD700;
    margin-left: 15px;
    vertical-align: baseline;
}

/* STATUS FOOTER */
.status-footer {
    display: block;
    background-color: rgba(0,0,0,0.3);
    padding: 20px 30px;
    border-radius: 20px;
    overflow: hidden; /* Clearfix loop */
}

.clock-sync {
    float: left;
}

.clock-display { 
    display: block;
    font-size: 30px; 
    font-weight: bold;
    margin-bottom: 5px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
}

#sync-status {
    display: block;
    font-size: 18px;
    color: #CCCCCC;
}

.refresh-btn {
    float: right;
    margin-top: 10px;
    background-color: #FFD700;
    color: #000;
    border: none;
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.price-up    { color: #00FF66; }
.price-down  { color: #FF4444; }
.price-equal { color: #FFFFFF; }
</style>

</head>

<body>

<div class="main-table">
    <div class="main-row">
        <!-- LEFT: logo + diff + update -->
        <div class="left-col">
            <div class="shop-header">
                <img src="logo_no_bg.png" class="shop-logo" alt="Logo">
                <div class="shop-name">ร้านทองอลงกรณ์</div>
            </div>

            <div id="diff-info" class="diff-tag">รอข้อมูล...</div>

            <div id="update-info"></div>
        </div>

        <!-- RIGHT: asso prices + clock -->
        <div class="right-col">

            <div class="asso-card">
                <div class="asso-label">สมาคมฯ รับซื้อ</div>
                <div class="price-row">
                    <span id="asso-buy" class="asso-price">---</span>
                    <span class="asso-unit">บาท</span>
                </div>
            </div>

            <div class="asso-card">
                <div class="asso-label">สมาคมฯ ขายออก</div>
                <div class="price-row">
                    <span id="asso-sell" class="asso-price">---</span>
                    <span class="asso-unit">บาท</span>
                </div>
            </div>

            <div class="status-footer">
                <div class="clock-sync">
                    <div id="clock" class="clock-display"></div>
                    <div id="sync-status"></div>
                </div>
                <button class="refresh-btn" onclick="location.reload();">⟳ REFRESH</button>
            </div>

        </div>
    </div>
</div>

<script>
function formatNumber(num){
    return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",");
}

function updateClock(){
    var d=new Date();
    var h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
    h=h<10?'0'+h:h;
    m=m<10?'0'+m:m;
    s=s<10?'0'+s:s;
    document.getElementById('clock').innerHTML=h+':'+m+':'+s+' น.';
}
setInterval(updateClock,1000);
updateClock();

/* state กลาง */
var latestData = null;
var openingData = null;

/* โหลด JSON */
function fetchJSON(url, callback){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url + '?v=' + new Date().getTime(), true);
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4 && xhr.status === 200){
            try {
                callback(JSON.parse(xhr.responseText));
            } catch(e){}
        }
    };
    xhr.send();
}

/* render กลาง */
function tryRender(){
    if(!latestData || !openingData) return;

    var res = latestData.response;

    var buy  = parseFloat(res.price.gold_bar.buy.replace(/,/g,''));
    var sell = parseFloat(res.price.gold_bar.sell.replace(/,/g,''));

    document.getElementById('asso-buy').innerText  = formatNumber(buy);
    document.getElementById('asso-sell').innerText = formatNumber(sell);

    /* date + time */
    var cleanTime = res.update_time.replace('เวลา ', '');
    document.getElementById('update-info').innerHTML =
      'อัปเดต: ' + res.update_date + ' ' + cleanTime;

    /* diff */
    var openSell = parseFloat(openingData.response.price.gold_bar.sell.replace(/,/g,''));
    var diff = sell - openSell;

    var diffEl = document.getElementById('diff-info');

    if(diff > 0){
        diffEl.innerHTML = '<span class="price-up">▲ วันนี้ขึ้น ' + formatNumber(diff) + ' บาท</span>';
    }
    else if(diff < 0){
        diffEl.innerHTML = '<span class="price-down">▼ วันนี้ลง ' + formatNumber(Math.abs(diff)) + ' บาท</span>';
    }
    else{
        diffEl.innerHTML = '<span class="price-equal">— ราคาเท่าตอนเปิดตลาด —</span>';
    }

    /* sync status */
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes();
    h = h < 10 ? '0'+h : h;
    m = m < 10 ? '0'+m : m;

    document.getElementById('sync-status').innerHTML =
      '<span style="color:#00FF00;">●</span> เชื่อมต่อล่าสุด ' + h + ':' + m + ' น.';
}

/* fetch ทั้งสอง */
function fetchAll(){
    latestData = null;
    openingData = null;

    fetchJSON('latest_gold.json', function(data){
        latestData = data;
        tryRender();
    });

    fetchJSON('daily_opening.json', function(data){
        openingData = data;
        tryRender();
    });
}

setInterval(fetchAll, 10000);
fetchAll();
</script>

</body>
</html>
