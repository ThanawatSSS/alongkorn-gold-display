<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>
    <style>
        /* CSS พื้นฐานเพื่อความเข้ากันได้สูงกับ TV รุ่นเก่า */
        body {
            margin: 0;
            padding: 0;
            background-color: #2c0404; /* พื้นหลังสีแดงเข้ม/มารูน */
            color: #ffffff;
            font-family: "Tahoma", "Arial", sans-serif; /* ฟอนต์มาตรฐานที่มักมีใน TV */
            text-align: center;
            overflow-y: auto; /* เปิดให้ scroll ได้หากพื้นที่ไม่พอ */
            display: block; 
        }

        .container {
            width: 100%;
            min-height: 100%; /* ใช้ min-height แทน vh เพื่อความชัวร์ */
            padding: 20px;
            box-sizing: border-box;
            border: 10px solid #ffd700; /* กรอบสีทอง */
            background-color: #2c0404; /* Fallback สำหรับรุ่นเก่ามากๆ */
            background: -webkit-radial-gradient(circle, #4a0404 0%, #2c0404 100%);
            background: radial-gradient(circle, #4a0404 0%, #2c0404 100%);
        }

        .header {
            margin-bottom: 10px;
        }

        .logo {
            height: 80px; /* ลดขนาดลงจาก 120px */
            margin-bottom: 5px;
        }

        .shop-name {
            font-size: 36px; /* ลดขนาดลงจาก 48px */
            color: #ffd700;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }

        .datetime-container {
            font-size: 22px;
            color: #f1c40f;
            margin-bottom: 15px; /* ลดลงจาก 30px */
        }

        .price-grid {
            width: 90%;
            margin: 0 auto;
            border-collapse: collapse;
        }

        .price-card {
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffd700;
            border-radius: 15px;
            margin: 10px;
            padding: 20px;
            display: inline-block;
            vertical-align: top;
            width: 30%;
        }

        .main-price-card {
            width: 65%;
            background-color: #ffd700; /* Fallback */
            background: -webkit-linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: #2c0404;
            display: block;
            margin: 0 auto 15px auto; /* ลดลงจาก 30px */
        }

        .label {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .price {
            font-size: 80px;
            font-weight: bold;
            margin: 5px 0;
        }

        .main-price {
            font-size: 100px;
        }

        .unit {
            font-size: 32px;
        }

        .status {
            margin-top: 30px;
            font-size: 18px;
            color: #ccc;
        }

        .highlight {
            color: #ffd700;
            font-weight: bold;
        }

        .price-up {
            color: #2ecc71 !important; /* เขียว */
        }

        .price-down {
            color: #ff4757 !important; /* แดง */
        }

        .diff-text {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }

        .time-ago {
            font-size: 20px;
            color: #aaa;
            margin-top: 5px;
        }

        .refresh-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background-color: rgba(255, 215, 0, 0.1);
        }

        #debug-log {
            margin-top: 30px;
            padding: 10px;
            background-color: #000;
            color: #0f0; /* สีเขียวแบบ Terminal */
            font-family: monospace;
            font-size: 14px;
            text-align: left;
            border: 1px solid #333;
            max-height: 150px;
            overflow-y: auto;
            width: 90%;
            margin: 20px auto;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- ใส่โลโก้จาก Downloads -->
            <img src="logo_no_bg.png" alt="Logo" class="logo" id="logo">
            <h1 class="shop-name">ร้านทองอลงกรณ์</h1>
            <div id="clock" class="datetime-container">กำลังโหลดเวลา...</div>
        </div>

        <!-- ราคาขายหน้าร้าน (คำนวณจากสมาคม + 1450) -->
        <div class="price-card main-price-card">
            <div class="label">ราคาขายออกหน้าร้าน (ประมาณ)</div>
            <div id="shop-sell" class="price main-price">---</div>
            <div class="unit">บาท / บาททองคำ</div>
        </div>

        <div class="price-grid">
            <!-- ราคาสมาคม รับซื้อ -->
            <div class="price-card">
                <div class="label">สมาคม รับซื้อ</div>
                <div id="asso-buy" class="price" style="color: #ffcccc;">---</div>
                <div class="unit">บาท</div>
            </div>

            <!-- ราคาสมาคม ขายออก -->
            <div class="price-card">
                <div class="label">สมาคม ขายออก</div>
                <div id="asso-sell" class="price" style="color: #ffd700;">---</div>
                <div class="unit">บาท</div>
            </div>
        </div>

        <div id="update-info" class="status">
            กำลังเตรียมการดึงข้อมูล...
        </div>
        <div id="proxy-info" style="font-size: 14px; color: #888; margin-top: 5px;"></div>
        <div id="diff-info" class="diff-text"></div>
        <div id="time-ago-info" class="time-ago"></div>
        
        <button class="refresh-btn" onclick="location.reload();">รีเฟรชหน้าจอ</button>
        
        <div id="debug-log">
            [System] เริ่มการทำงานระบบ...<br>
        </div>
    </div>

    <script type="text/javascript">
        // ฟังก์ชันช่วยบันทึก Log ลงหน้าจอ
        function log(msg) {
            var logEl = document.getElementById('debug-log');
            if (logEl) {
                var now = new Date();
                var time = now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds();
                logEl.innerHTML += '[' + time + '] ' + msg + '<br>';
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        // ฟังก์ชันอัปเดตนาฬิกา
        function updateClock() {
            var now = new Date();
            var days = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
            var months = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            
            var dayName = days[now.getDay()];
            var date = now.getDate();
            var monthName = months[now.getMonth()];
            var year = now.getFullYear() + 543; // พ.ศ.
            
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            
            // เติมเลข 0 ข้างหน้าถ้าหลักเดียว
            if (hours < 10) hours = '0' + hours;
            if (minutes < 10) minutes = '0' + minutes;
            if (seconds < 10) seconds = '0' + seconds;
            
            var timeString = hours + ':' + minutes + ':' + seconds + ' น.';
            var dateString = 'วัน' + dayName + 'ที่ ' + date + ' ' + monthName + ' ' + year;
            
            document.getElementById('clock').innerHTML = dateString + ' | ' + timeString;
        }

        // ฟังก์ชันฟอร์แมตตัวเลข (ใส่คอมม่า)
        function formatNumber(num) {
            if (!num) return '---';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // ฟังก์ชันดึงราคาทอง (ใช้ JSONP เพื่อข้าม CORS/SSL ในทีวีรุ่นเก่า)
        var fetchTimeout = null;
        var attemptCount = 0;

        function fetchGoldPrice() {
            attemptCount++;
            log('เริ่มดึงข้อมูลครั้งที่ ' + attemptCount);
            
            var isHttps = (location.protocol === 'https:');
            log('Protocol ปัจจุบัน: ' + location.protocol);
            
            var targetUrl = 'https://api.chnwt.dev/thai-gold-api/latest';
            // หากเว็บโหลดผ่าน HTTP ให้ใช้ HTTP Proxy เพื่อลดปัญหา SSL
            var proxyBase = isHttps ? 'https://api.allorigins.win/get?url=' : 'http://api.allorigins.win/get?url=';
            
            var proxyUrl = proxyBase + encodeURIComponent(targetUrl) + '&callback=handleGoldResponse&t=' + new Date().getTime();
            
            log('Target: ' + targetUrl);
            log('Using Proxy: ' + (isHttps ? 'HTTPS' : 'HTTP'));

            document.getElementById('proxy-info').innerText = 'กำลังดึงข้อมูล (Attempt ' + attemptCount + ')...';
            
            // ล้าง Script เก่า
            var oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.parentNode.removeChild(oldScript);
            
            // สร้าง Script ใหม่
            var script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = proxyUrl;
            
            // ตั้งเวลา Timeout 30 วินาที
            if (fetchTimeout) clearTimeout(fetchTimeout);
            fetchTimeout = setTimeout(function() {
                if (document.getElementById('asso-buy').innerText === '---') {
                    log('!!! Timeout: ดึงข้อมูลไม่สำเร็จใน 30 วินาที');
                    document.getElementById('update-info').innerText = 'ดึงข้อมูลไม่สำเร็จ (Timeout)';
                }
            }, 30000); 
            
            log('Injected script tag...');
            document.body.appendChild(script);
        }

        // Callback สำหรับ JSONP
        window.handleGoldResponse = function(data) {
            log('ได้รับ Callback จาก Proxy แล้ว!');
            if (fetchTimeout) clearTimeout(fetchTimeout);
            
            if (data && data.contents) {
                try {
                    log('กำลัง Parse JSON ข้อมูลราคาทอง...');
                    var realData = JSON.parse(data.contents);
                    renderGoldData(realData);
                    log('แสดงผลราคาทองสำเร็จ');
                    document.getElementById('proxy-info').innerText = 'ดึงข้อมูลสำเร็จ';
                } catch (e) {
                    log('Parse Error: ' + e.message);
                    document.getElementById('update-info').innerText = 'ข้อมูลผิดพลาด: ' + e.message;
                }
            } else {
                log('Error: ข้อมูล contents ว่างเปล่า');
                document.getElementById('update-info').innerText = 'ไม่ได้รับข้อมูล';
            }
        };

        // ฟังก์ชันแสดงผลข้อมูล
        function renderGoldData(data) {
            if (data.status === 'success') {
                var response = data.response;
                var prices = response.price.gold_bar;
                
                // ราคาสมาคม (ดึงเป็นตัวเลขเพื่อคำนวณ)
                var assoBuy = parseFloat(prices.buy.replace(/,/g, ''));
                var assoSell = parseFloat(prices.sell.replace(/,/g, ''));
                
                // ราคาขายหน้าร้าน (+1450)
                var shopSell = assoSell + 1450;
                
                // แสดงผลราคา
                document.getElementById('asso-buy').innerText = formatNumber(assoBuy);
                document.getElementById('asso-sell').innerText = formatNumber(assoSell);
                document.getElementById('shop-sell').innerText = formatNumber(shopSell);
                
                // แสดงการเปลี่ยนแปลง (ขึ้น/ลง)
                var diff = response.update_diff || "0";
                var diffEl = document.getElementById('diff-info');
                if (diff.indexOf('+') !== -1) {
                    diffEl.innerHTML = '<span class="price-up">▲ ขึ้น ' + diff + ' บาท</span>';
                } else if (diff.indexOf('-') !== -1) {
                    diffEl.innerHTML = '<span class="price-down">▼ ลง ' + diff + ' บาท</span>';
                } else {
                    diffEl.innerHTML = '<span style="color: #fff;">- ราคาคงที่ -</span>';
                }

                // ข้อมูลอัปเดต
                document.getElementById('update-info').innerHTML = 
                    'ข้อมูลสมาคม: <span class="highlight">' + response.update_time + '</span>';
                
                // คำนวณเวลาที่ผ่านไป
                calculateTimeAgo(response.update_time);
            }
        }

        // ฟังก์ชันคำนวณเวลาที่อัปเดตไปแล้ว
        var lastUpdateTimeStr = "";
        function calculateTimeAgo(updateTimeStr) {
            if (updateTimeStr) lastUpdateTimeStr = updateTimeStr;
            if (!lastUpdateTimeStr) return;

            var now = new Date();
            // ใช้ Regex สกัดเฉพาะตัวเลข ชั่วโมง:นาที หรือ ชั่วโมง.นาที
            var matches = lastUpdateTimeStr.match(/(\d{1,2})[:.](\d{1,2})/);
            if (!matches) return;

            var updateHour = parseInt(matches[1], 10);
            var updateMin = parseInt(matches[2], 10);

            if (isNaN(updateHour) || isNaN(updateMin)) return;

            var updateDate = new Date(now.getTime()); // คัดลอกวันปัจจุบันมา
            updateDate.setHours(updateHour, updateMin, 0, 0);

            // ถ้าเวลาที่อัปเดต มากกว่าเวลาปัจจุบัน (เช่น อัปเดต 23:55 แต่อินเทอร์เน็ตเครื่องเป็น 00:05 วันถัดไป)
            // ให้ถือว่าราคาอัปเดตตั้งแต่ "เมื่อวาน"
            if (updateDate > now) {
                updateDate.setDate(updateDate.getDate() - 1);
            }

            // คำนวณผลต่าง (มิลลิวินาที)
            var diffMs = now.getTime() - updateDate.getTime();
            var diffMins = Math.floor(diffMs / 60000);

            var timeAgoEl = document.getElementById('time-ago-info');
            if (isNaN(diffMins) || diffMins < 0) {
                timeAgoEl.innerText = 'อัปเดตเมื่อเร็วๆ นี้';
            } else if (diffMins === 0) {
                timeAgoEl.innerText = 'อัปเดตเมื่อไม่กี่วินาทีที่แล้ว';
            } else if (diffMins < 60) {
                timeAgoEl.innerText = 'อัปเดตเมื่อ ' + diffMins + ' นาทีที่แล้ว';
            } else {
                var diffHours = Math.floor(diffMins / 60);
                var remainMins = diffMins % 60;
                timeAgoEl.innerText = 'อัปเดตเมื่อ ' + diffHours + ' ชม. ' + remainMins + ' นาทีที่แล้ว';
            }
        }

        // เริ่มต้นการทำงาน
        setInterval(updateClock, 1000); // อัปเดตนาฬิกาทุกวินาที
        updateClock();

        setInterval(function() {
            calculateTimeAgo(); // อัปเดต "กี่นาทีที่แล้ว" ทุก 10 วินาที
        }, 10000);

        // รอ 5 วินาทีก่อนดึงครั้งแรก เพื่อให้ทีวีเตรียมความพร้อมเครือข่าย
        setTimeout(function() {
            fetchGoldPrice();
        }, 5000);

        setInterval(fetchGoldPrice, 60000); // อัปเดตราคาทุก 60 วินาที
    </script>
</body>
</html>
