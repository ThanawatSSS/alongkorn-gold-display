<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>
    <style>
        /* CSS Reset for old TVs */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #7B0000; /* สีแดงเข้มแบบ Crimson */
            color: #FFFFFF;
            font-family: 'Prompt', 'Kanit', 'Tahoma', 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(135deg, #990000 0%, #7B0000 100%);
        }

        .container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1.6fr 1fr; /* แบ่งฝั่งซ้าย (ราคาหลัก) และฝั่งขวา (รายละเอียด) */
            padding: 20px;
            gap: 20px;
        }

        /* ฝั่งซ้าย: ราคาหลักหน้าร้าน */
        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #FFD700;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }

        .header-box {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 15px;
        }

        .logo { height: 70px; }
        .shop-name { font-size: 42px; color: #FFD700; font-weight: bold; }

        .price-hero-box {
            text-align: center;
            margin: auto 0;
        }

        .shop-label { font-size: 32px; color: #FFF; margin-bottom: 15px; font-weight: bold; }
        .price-main { font-size: 140px; color: #FFD700; font-weight: 900; line-height: 1; text-shadow: 4px 4px 0px #000; }
        .unit { font-size: 40px; color: #FFD700; margin-left: 10px; font-weight: bold; }

        .diff-tag {
            font-size: 32px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            padding: 5px 30px;
            border-radius: 50px;
            background: rgba(0,0,0,0.5);
        }

        /* ฝั่งขวา: รายละเอียดย่อย สมาคมฯ */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.5);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid #FFD700;
            text-align: center;
        }

        .card-label { font-size: 26px; color: #CCC; margin-bottom: 10px; font-weight: bold; }
        .card-price { font-size: 54px; color: #FFD700; font-weight: 900; }

        /* แถบล่าง */
        .footer-bar {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 10px 10px 0 10px;
        }

        .status-group { color: #FFD700; font-size: 18px; line-height: 1.5; font-weight: bold; }
        .clock-box { font-size: 32px; color: #FFF; font-weight: bold; }

        .refresh-btn {
            background: #FFD700; color: #000; border: none; padding: 10px 25px;
            font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer;
        }

        .price-up { color: #00FF00; }
        .price-down { color: #FF3B3B; }
        .sync-active { color: #00FF00; font-size: 14px; }
        
        #debug-log { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ฝั่งซ้าย -->
        <div class="left-panel">
            <div class="header-box">
                <img src="logo_no_bg.png" alt="Logo" class="logo">
                <div class="shop-name">ร้านทองอลงกรณ์</div>
            </div>

            <div class="price-hero-box">
                <div class="shop-label">ราคาขายออกหน้าร้าน</div>
                <div>
                    <span id="shop-sell" class="price-main">---</span>
                    <span class="unit">บาท</span>
                </div>
                <div id="diff-info" class="diff-tag">รอข้อมูล...</div>
            </div>

            <div class="status-group">
                <div id="update-info">กำลังเชื่อมต่อ...</div>
                <div id="time-ago-info" style="color: #AAA;"></div>
            </div>
        </div>

        <!-- ฝั่งขวา -->
        <div class="right-panel">
            <div class="card">
                <div class="card-label">สมาคมฯ รับซื้อ</div>
                <div id="asso-buy" class="card-price">---</div>
            </div>
            <div class="card">
                <div class="card-label">สมาคมฯ ขายออก</div>
                <div id="asso-sell" class="card-price">---</div>
            </div>
            <div id="sync-status" class="sync-active" style="text-align: center;">🟢 ระบบกำลังทำงานปกติ...</div>
        </div>

        <!-- แถบล่าง -->
        <div class="footer-bar">
            <div>
                <div id="clock" class="clock-box">---</div>
                <div id="heartbeat-text" style="color: #888; font-size: 14px; margin-top: 5px;"></div>
            </div>
            <button class="refresh-btn" onclick="location.reload();">🔄 รีเฟรชหน้าจอ</button>
        </div>
    </div>

    <script type="text/javascript">
        function formatNumber(num) {
            if (!num) return '---';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? '0'+h : h; m = m < 10 ? '0'+m : m; s = s < 10 ? '0'+s : s;
            document.getElementById('clock').innerHTML = h + ':' + m + ':' + s + ' น.';
        }

        var nextFetchRemaining = 10;
        function updateHeartbeat() {
            nextFetchRemaining--;
            if (nextFetchRemaining <= 0) {
                nextFetchRemaining = 10;
                fetchGoldPrice();
            }
            document.getElementById('heartbeat-text').innerText = 'ตรวจสอบราคาอีกครั้งใน ' + nextFetchRemaining + ' วินาที';
        }

        function fetchGoldPrice() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', './latest_gold.json?v=' + Math.floor(new Date().getTime() / 1000), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try { renderGoldData(JSON.parse(xhr.responseText)); } catch (e) {}
                }
            };
            xhr.send();
            
            // ตรวจสอบสถานะการเชื่อมต่อ (Sync Check)
            var syncXhr = new XMLHttpRequest();
            syncXhr.open('GET', './last_sync.json?v=' + Math.floor(new Date().getTime() / 1000), true);
            syncXhr.onreadystatechange = function() {
                if (syncXhr.readyState === 4 && syncXhr.status === 200) {
                    try {
                        var syncData = JSON.parse(syncXhr.responseText);
                        document.getElementById('sync-status').innerText = '🟢 เชื่อมต่อเซิร์ฟเวอร์ล่าสุด: ' + syncData.last_sync;
                    } catch (e) {}
                }
            };
            syncXhr.send();
        }

        function renderGoldData(data) {
            if (data.status === 'success') {
                var response = data.response;
                var prices = response.price.gold_bar;
                var assoBuy = parseFloat(prices.buy.replace(/,/g, ''));
                var assoSell = parseFloat(prices.sell.replace(/,/g, ''));
                var shopSell = assoSell + 1450;
                
                document.getElementById('asso-buy').innerText = formatNumber(assoBuy);
                document.getElementById('asso-sell').innerText = formatNumber(assoSell);
                document.getElementById('shop-sell').innerText = formatNumber(shopSell);
                
                var diff = response.update_diff || "0";
                var diffEl = document.getElementById('diff-info');
                if (diff.indexOf('+') !== -1) {
                    diffEl.innerHTML = '<span class="price-up">▲ ขึ้น ' + diff + ' บาท</span>';
                } else if (diff.indexOf('-') !== -1) {
                    diffEl.innerHTML = '<span class="price-down">▼ ลง ' + diff + ' บาท</span>';
                } else {
                    diffEl.innerHTML = '<span>- ราคาคงที่ -</span>';
                }

                document.getElementById('update-info').innerHTML = 
                    'สมาคมล่าสุด: <span style="color:#FFF">' + response.update_time + '</span>';
                calculateTimeAgo(response.update_time);
            }
        }

        var lastUpdate = "";
        function calculateTimeAgo(timeStr) {
            if (timeStr) lastUpdate = timeStr;
            if (!lastUpdate) return;
            var now = new Date();
            var m = lastUpdate.match(/(\d{1,2})[:.](\d{1,2})/);
            if (!m) return;
            var h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
            var d = new Date(now.getTime()); d.setHours(h, mi, 0, 0);
            if (d > now) d.setDate(d.getDate() - 1);
            var diff = Math.floor((now.getTime() - d.getTime()) / 60000);
            var el = document.getElementById('time-ago-info');
            if (diff < 1) el.innerText = 'เพิ่งอัปเดต';
            else el.innerText = 'อัปเดตเมื่อ ' + diff + ' นาทีที่แล้ว';
        }

        setInterval(updateClock, 1000); updateClock();
        setInterval(updateHeartbeat, 1000);
        fetchGoldPrice();
    </script>
</body>
</html>
