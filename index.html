<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>
    <style>
        /* CSS Reset for old TVs */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            /* สีแดงทึบ (Solid Deep Red) เพื่อความชัดเจนสูงสุดบนจอทีวี */
            background-color: #8B0000; 
            color: #FFFFFF;
            font-family: 'Tahoma', 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%; /* ใช้ 100% เพื่อแก้ปัญหา Margin ขวา */
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* ส่วนหัว */
        .header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            padding: 5px;
            border-bottom: 2px solid #FFD700;
        }

        .shop-name {
            font-size: 28px;
            color: #FFD700; /* สีทองสว่าง */
            font-weight: bold;
            margin: 0 10px;
        }

        .logo {
            height: 40px;
        }

        /* Hero: ราคาหลัก */
        .hero-section {
            background-color: #000000; /* พื้นหลังสีดำเพื่อให้ราคาเด่นที่สุด */
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            border: 4px solid #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .shop-label {
            font-size: 22px;
            color: #FFFFFF;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .price-main {
            font-size: 90px; /* ขนาดตายตัวสำหรับจอ 480px */
            color: #FFD700;
            font-weight: 900;
            line-height: 1;
        }

        .unit {
            font-size: 24px;
            color: #FFD700;
            margin-left: 5px;
        }

        /* รายละเอียดย่อย (ราคาสมาคม) */
        .details-grid {
            display: flex;
            width: 100%;
            gap: 10px;
            justify-content: center;
        }

        .card {
            background-color: #4A0000;
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #FFD700;
        }

        .card-label {
            font-size: 18px;
            color: #FFFFFF;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card-price {
            font-size: 32px;
            color: #FFD700;
            font-weight: bold;
        }

        /* Footer: สถานะและเวลา */
        .footer {
            width: 100%;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            font-weight: bold;
        }

        .status-text {
            color: #FFD700;
            font-size: 16px;
            text-align: left;
        }

        .price-up { color: #00FF00; }
        .price-down { color: #FF4444; }

        /* ตัวบ่งชี้การอัปเดต (Heartbeat) */
        .heartbeat {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .refresh-btn {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 5px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        /* ซ่อน Debug */
        #debug-console { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="logo_no_bg.png" alt="Logo" class="logo">
            <div class="shop-name">ร้านทองอลงกรณ์</div>
        </div>

        <!-- Hero -->
        <div class="hero-section">
            <div class="shop-label">ราคาขายออกหน้าร้าน</div>
            <div>
                <span id="shop-sell" class="price-main">---</span>
                <span class="unit">บาท</span>
            </div>
            <div id="diff-info" style="font-size: 20px; font-weight: bold; margin-top: 5px;">กำลังโหลด...</div>
        </div>

        <!-- Details -->
        <div class="details-grid">
            <div class="card">
                <div class="card-label">สมาคม รับซื้อ</div>
                <div id="asso-buy" class="card-price">---</div>
            </div>
            <div class="card">
                <div class="card-label">สมาคม ขายออก</div>
                <div id="asso-sell" class="card-price">---</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="status-group">
                <div id="clock" style="color: #FFF; font-size: 16px;">---</div>
                <div id="update-info" class="status-text">กำลังเชื่อมต่อ...</div>
                <div id="time-ago-info" style="color: #AAA; font-size: 14px;"></div>
                <div id="heartbeat-text" class="heartbeat">กำลังตรวจสอบราคา...</div>
            </div>
            <button class="refresh-btn" onclick="location.reload();">RELOAD</button>
        </div>

        <div id="debug-console"></div>
    </div>

    <script type="text/javascript">
        // ฟังก์ชันอัปเดตนาฬิกา
        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? '0'+h : h; m = m < 10 ? '0'+m : m; s = s < 10 ? '0'+s : s;
            document.getElementById('clock').innerHTML = h + ':' + m + ':' + s + ' น.';
        }

        function formatNumber(num) {
            if (!num) return '---';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // ระบบ Heartbeat เพื่อให้รู้ว่าสคริปต์ยังทำงานอยู่
        var nextFetchRemaining = 15;
        function updateHeartbeat() {
            nextFetchRemaining--;
            if (nextFetchRemaining <= 0) {
                nextFetchRemaining = 15;
                fetchGoldPrice();
            }
            document.getElementById('heartbeat-text').innerText = 'ตรวจเช็คราคาครั้งต่อไปใน ' + nextFetchRemaining + ' วินาที';
        }

        function fetchGoldPrice() {
            var xhr = new XMLHttpRequest();
            // ป้องกันการ Cache ด้วย timestamp แบบวินาที
            xhr.open('GET', './latest_gold.json?v=' + Math.floor(new Date().getTime() / 1000), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            renderGoldData(data);
                        } catch (e) {
                            document.getElementById('update-info').innerText = 'ข้อมูลผิดพลาด';
                        }
                    } else {
                        document.getElementById('update-info').innerText = 'เชื่อมต่อล้มเหลว (' + xhr.status + ')';
                    }
                }
            };
            xhr.send();
        }

        function renderGoldData(data) {
            if (data.status === 'success') {
                var response = data.response;
                var prices = response.price.gold_bar;
                var assoBuy = parseFloat(prices.buy.replace(/,/g, ''));
                var assoSell = parseFloat(prices.sell.replace(/,/g, ''));
                var shopSell = assoSell + 1450;
                
                document.getElementById('asso-buy').innerText = formatNumber(assoBuy);
                document.getElementById('asso-sell').innerText = formatNumber(assoSell);
                document.getElementById('shop-sell').innerText = formatNumber(shopSell);
                
                var diff = response.update_diff || "0";
                var diffEl = document.getElementById('diff-info');
                if (diff.indexOf('+') !== -1) {
                    diffEl.innerHTML = '<span class="price-up">▲ ขึ้น ' + diff + ' บาท</span>';
                } else if (diff.indexOf('-') !== -1) {
                    diffEl.innerHTML = '<span class="price-down">▼ ลง ' + diff + ' บาท</span>';
                } else {
                    diffEl.innerHTML = '<span style="color: #fff;">- ราคาคงที่ -</span>';
                }

                document.getElementById('update-info').innerHTML = 
                    'สมาคมล่าสุด: <span style="color:#FFF">' + response.update_time + '</span>';
                calculateTimeAgo(response.update_time);
            }
        }

        var lastUpdate = "";
        function calculateTimeAgo(timeStr) {
            if (timeStr) lastUpdate = timeStr;
            if (!lastUpdate) return;
            var now = new Date();
            var m = lastUpdate.match(/(\d{1,2})[:.](\d{1,2})/);
            if (!m) return;
            var h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
            var d = new Date(now.getTime()); d.setHours(h, mi, 0, 0);
            if (d > now) d.setDate(d.getDate() - 1);
            var diff = Math.floor((now.getTime() - d.getTime()) / 60000);
            var el = document.getElementById('time-ago-info');
            if (diff < 1) el.innerText = 'เพิ่งอัปเดต';
            else el.innerText = 'อัปเดตเมื่อ ' + diff + ' นาทีที่แล้ว';
        }

        setInterval(updateClock, 1000); updateClock();
        setInterval(updateHeartbeat, 1000);
        fetchGoldPrice();
    </script>
</body>
</html>
