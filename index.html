<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #ffd700;
            font-family: 'Tahoma', 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* ป้องกัน Scroll ในทีวี */
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
        }

        .container {
            width: 90vw; /* Safety Margin 5% รอบทิศ */
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 2vh 0;
        }

        /* ส่วนหัว: โลโก้และหัวข้อ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 2vw;
        }

        .logo-group {
            display: flex;
            align-items: center;
            text-align: left;
        }

        .logo {
            height: 10vh;
            margin-right: 2vw;
        }

        .shop-name {
            font-size: 3vw;
            color: #ffd700;
            font-weight: bold;
        }

        #clock {
            font-size: 2.5vw;
            color: #fff;
            text-align: right;
        }

        /* ส่วนราคาหลัก (Hero) */
        .hero-section {
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            width: 100%;
            padding: 4vh;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,1);
            border: 4px solid #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .shop-label {
            font-size: 3.5vw;
            color: #000;
            font-weight: bold;
            margin-bottom: 1vh;
        }

        .price-main {
            font-size: 16vw; /* ตัวเลขราคาใหญ่มาก */
            color: #000;
            font-weight: 900;
            line-height: 0.9;
        }

        .unit {
            font-size: 4vw;
            color: #333;
            margin-left: 1vw;
            font-weight: bold;
        }

        /* ส่วนรายละเอียดย่อย (ราคาสมาคม) */
        .details-grid {
            display: flex;
            width: 100%;
            gap: 3vw;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            flex: 1;
            padding: 3vh;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.1);
        }

        .card-label {
            font-size: 2.2vw;
            color: #fff;
            margin-bottom: 1vh;
        }

        .card-price {
            font-size: 6vw;
            color: #ffd700;
            font-weight: bold;
        }

        /* ข้อมูลสถานะและเวลาอัปเดต */
        .footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888;
            font-size: 1.8vw;
            padding: 0 2vw;
        }

        .status-group {
            text-align: left;
        }

        .price-up { color: #00ff00; }
        .price-down { color: #ff3b3b; }
        .highlight { color: #fff; font-weight: bold; }

        .refresh-btn {
            padding: 1vh 2vw;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: #444;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2vw;
        }

        /* ซ่อน Debug Log สำหรับการใช้งานจริง */
        #debug-log, #proxy-info {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-group">
                <img src="logo_no_bg.png" alt="Logo" class="logo">
                <div class="shop-name">ร้านทองอลงกรณ์</div>
            </div>
            <div id="clock">กำลังโหลดเวลา...</div>
        </div>

        <!-- Hero: Shop Price -->
        <div class="hero-section">
            <div class="shop-label">ราคาขายออกหน้าร้าน</div>
            <div class="price-display">
                <span id="shop-sell" class="price-main">---</span>
                <span class="unit">บาท</span>
            </div>
            <div id="diff-info" style="font-size: 3vw; margin-top: 1vh; font-weight: bold;"></div>
        </div>

        <!-- Details: Association Prices -->
        <div class="details-grid">
            <div class="card">
                <div class="card-label">สมาคมฯ รับซื้อ</div>
                <div id="asso-buy" class="card-price">---</div>
            </div>
            <div class="card">
                <div class="card-label">สมาคมฯ ขายออก</div>
                <div id="asso-sell" class="card-price">---</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="status-group">
                <div id="update-info">กำลังเตรียมการดึงข้อมูล...</div>
                <div id="time-ago-info"></div>
            </div>
            <button class="refresh-btn" onclick="location.reload();">รีเฟรชหน้าจอ</button>
        </div>

        <!-- Hidden Elements for Logic -->
        <div id="proxy-info"></div>
        <div id="debug-log"></div>
    </div>

    <script type="text/javascript">
        // ฟังก์ชันช่วยบันทึก Log (สำหรับ Debug เบื้องหลัง)
        function log(msg) {
            var logEl = document.getElementById('debug-log');
            if (logEl) {
                var now = new Date();
                var time = now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds();
                logEl.innerHTML += '[' + time + '] ' + msg + '<br>';
            }
            console.log(msg);
        }

        // ฟังก์ชันอัปเดตนาฬิกา
        function updateClock() {
            var now = new Date();
            var days = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
            var months = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            
            var dayName = days[now.getDay()];
            var date = now.getDate();
            var monthName = months[now.getMonth()];
            var year = now.getFullYear() + 543;
            
            var h = now.getHours();
            var m = now.getMinutes();
            var s = now.getSeconds();
            h = h < 10 ? '0' + h : h;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;
            
            document.getElementById('clock').innerHTML = 'วัน' + dayName + 'ที่ ' + date + ' ' + monthName + ' ' + year + ' | ' + h + ':' + m + ':' + s + ' น.';
        }

        function formatNumber(num) {
            if (!num) return '---';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        var attemptCount = 0;
        function fetchGoldPrice() {
            attemptCount++;
            log('Fetching attempt ' + attemptCount);
            var url = './latest_gold.json?t=' + new Date().getTime();
            
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            renderGoldData(data);
                            log('Fetch Success');
                        } catch (e) {
                            log('JSON Parse Error');
                        }
                    } else {
                        log('Fetch Error Status: ' + xhr.status);
                        if (xhr.status === 404) {
                            document.getElementById('update-info').innerText = 'กำลังรอข้อมูลอัปเดตจากระบบ...';
                        }
                    }
                }
            };
            xhr.send();
        }

        function renderGoldData(data) {
            if (data.status === 'success') {
                var response = data.response;
                var prices = response.price.gold_bar;
                
                var assoBuy = parseFloat(prices.buy.replace(/,/g, ''));
                var assoSell = parseFloat(prices.sell.replace(/,/g, ''));
                var shopSell = assoSell + 1450;
                
                document.getElementById('asso-buy').innerText = formatNumber(assoBuy);
                document.getElementById('asso-sell').innerText = formatNumber(assoSell);
                document.getElementById('shop-sell').innerText = formatNumber(shopSell);
                
                var diff = response.update_diff || "0";
                var diffEl = document.getElementById('diff-info');
                if (diff.indexOf('+') !== -1) {
                    diffEl.innerHTML = '<span class="price-up">▲ ขึ้น ' + diff + ' บาท</span>';
                } else if (diff.indexOf('-') !== -1) {
                    diffEl.innerHTML = '<span class="price-down">▼ ลง ' + diff + ' บาท</span>';
                } else {
                    diffEl.innerHTML = '<span style="color: #fff;">- ราคาคงที่ -</span>';
                }

                document.getElementById('update-info').innerHTML = 
                    'ข้อมูลสมาคม: <span class="highlight">' + response.update_time + '</span>';
                
                calculateTimeAgo(response.update_time);
            }
        }

        var lastUpdate = "";
        function calculateTimeAgo(timeStr) {
            if (timeStr) lastUpdate = timeStr;
            if (!lastUpdate) return;

            var now = new Date();
            var m = lastUpdate.match(/(\d{1,2})[:.](\d{1,2})/);
            if (!m) return;

            var h = parseInt(m[1], 10);
            var mi = parseInt(m[2], 10);
            var d = new Date(now.getTime());
            d.setHours(h, mi, 0, 0);
            if (d > now) d.setDate(d.getDate() - 1);

            var diff = Math.floor((now.getTime() - d.getTime()) / 60000);
            var el = document.getElementById('time-ago-info');
            
            if (diff <= 0) el.innerText = 'อัปเดตเมื่อเร็วๆ นี้';
            else if (diff < 60) el.innerText = 'อัปเดตเมื่อ ' + diff + ' นาทีที่แล้ว';
            else el.innerText = 'อัปเดตเมื่อ ' + Math.floor(diff/60) + ' ชม. ' + (diff%60) + ' นาทีที่แล้ว';
        }

        setInterval(updateClock, 1000);
        updateClock();
        setInterval(function() { calculateTimeAgo(); }, 30000);
        setTimeout(fetchGoldPrice, 2000);
        setInterval(fetchGoldPrice, 60000);
    </script>
</body>
</html>
