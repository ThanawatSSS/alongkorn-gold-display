<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #4a0000; /* สีแดงเข้มพื้นฐาน */
            color: #ffd700; /* สีทอง */
            font-family: 'Tahoma', 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            /* ไล่เฉดสีแดงให้ดูหรูหรา */
            background-image: radial-gradient(circle, #800000 0%, #4a0000 100%);
        }

        .container {
            width: 96vw; 
            height: 96vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* กระจายคอนเทนต์ให้เต็มจอ */
            align-items: center;
            text-align: center;
            padding: 1vh 0;
        }

        /* Header: จัดวางแบบแถวเดียวเพื่อประหยัดพื้นที่แนวตั้ง */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 90%;
            gap: 2vw;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 1vh;
        }

        .logo {
            height: 7vh; /* เล็กลงเพื่อจอ 480px */
        }

        .shop-name {
            font-size: 3vw;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Hero section: ราคาขายออกหน้าร้าน */
        .hero-section {
            background: rgba(0, 0, 0, 0.3);
            width: 95%;
            padding: 2vh;
            border-radius: 15px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .shop-label {
            font-size: 3vw;
            color: #fff;
            margin-bottom: 0.5vh;
        }

        .price-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .price-main {
            /* ใช้ clamp เพื่อจำกัดความใหญ่ไม่ให้ล้นจอ */
            font-size: clamp(40px, 14vw, 120px); 
            color: #ffd700;
            font-weight: 900;
            line-height: 1;
            text-shadow: 3px 3px 0px #000;
        }

        .unit {
            font-size: 3.5vw;
            color: #ffd700;
            margin-left: 1.5vw;
            font-weight: bold;
        }

        /* สำหรับแสดง ขึ้น/ลง */
        .diff-text {
            font-size: 3vw;
            margin-top: 1vh;
            font-weight: bold;
            padding: 0.5vh 2vw;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            display: inline-block;
        }

        /* รายละเอียดย่อย (ราคาสมาคม) */
        .details-grid {
            display: flex;
            width: 95%;
            gap: 2vw;
            justify-content: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.2);
            flex: 1;
            padding: 1.5vh;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .card-label {
            font-size: 2vw;
            color: #fff;
            margin-bottom: 0.5vh;
        }

        .card-price {
            font-size: 4.5vw;
            color: #ffd700;
            font-weight: bold;
        }

        /* Footer: สถานะและเวลา */
        .footer {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffd700;
            font-size: 2vw;
            opacity: 0.8;
        }

        .highlight { color: #fff; font-weight: bold; }
        .price-up { color: #00ff00; }
        .price-down { color: #ff3b3b; }

        .refresh-btn {
            background: transparent;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 0.5vh 1.5vw;
            font-size: 1.5vw;
            border-radius: 5px;
            cursor: pointer;
        }

        /* ซ่อน Elements สำหรับ Logic */
        #debug-log, #proxy-info { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="logo_no_bg.png" alt="Logo" class="logo">
            <div class="shop-name">ร้านทองอลงกรณ์</div>
            <div id="clock" style="font-size: 2.2vw; color: #fff; margin-left: auto;">---</div>
        </div>

        <!-- Hero -->
        <div class="hero-section">
            <div class="shop-label">ราคาขายออกหน้าร้าน</div>
            <div class="price-display">
                <span id="shop-sell" class="price-main">---</span>
                <span class="unit">บาท</span>
            </div>
            <div id="diff-info" class="diff-text">รอข้อมูล...</div>
        </div>

        <!-- Details -->
        <div class="details-grid">
            <div class="card">
                <div class="card-label">สมาคมฯ รับซื้อ</div>
                <div id="asso-buy" class="card-price">---</div>
            </div>
            <div class="card">
                <div class="card-label">สมาคมฯ ขายออก</div>
                <div id="asso-sell" class="card-price">---</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div style="text-align: left;">
                <div id="update-info">กำลังโหลด...</div>
                <div id="time-ago-info"></div>
            </div>
            <button class="refresh-btn" onclick="location.reload();">RELOAD</button>
        </div>

        <div id="proxy-info"></div>
        <div id="debug-log"></div>
    </div>

    <script type="text/javascript">
        function log(msg) { console.log(msg); }

        function updateClock() {
            var now = new Date();
            var days = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'];
            var months = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            h = h < 10 ? '0'+h : h; m = m < 10 ? '0'+m : m; s = s < 10 ? '0'+s : s;
            document.getElementById('clock').innerHTML = 'วัน' + days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + (now.getFullYear()+543) + ' | ' + h + ':' + m + ':' + s;
        }

        function formatNumber(num) {
            if (!num) return '---';
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function fetchGoldPrice() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', './latest_gold.json?t=' + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try { renderGoldData(JSON.parse(xhr.responseText)); } catch (e) {}
                }
            };
            xhr.send();
        }

        function renderGoldData(data) {
            if (data.status === 'success') {
                var response = data.response;
                var prices = response.price.gold_bar;
                var assoBuy = parseFloat(prices.buy.replace(/,/g, ''));
                var assoSell = parseFloat(prices.sell.replace(/,/g, ''));
                var shopSell = assoSell + 1450;
                
                document.getElementById('asso-buy').innerText = formatNumber(assoBuy);
                document.getElementById('asso-sell').innerText = formatNumber(assoSell);
                document.getElementById('shop-sell').innerText = formatNumber(shopSell);
                
                var diff = response.update_diff || "0";
                var diffEl = document.getElementById('diff-info');
                if (diff.indexOf('+') !== -1) {
                    diffEl.innerHTML = '<span class="price-up">▲ ขึ้น ' + diff + ' บาท</span>';
                } else if (diff.indexOf('-') !== -1) {
                    diffEl.innerHTML = '<span class="price-down">▼ ลง ' + diff + ' บาท</span>';
                } else {
                    diffEl.innerHTML = '<span style="color: #fff;">- ราคาคงที่ -</span>';
                }

                document.getElementById('update-info').innerHTML = 
                    'สมาคมล่าสุด: <span class="highlight">' + response.update_time + '</span>';
                calculateTimeAgo(response.update_time);
            }
        }

        var lastUpdate = "";
        function calculateTimeAgo(timeStr) {
            if (timeStr) lastUpdate = timeStr;
            if (!lastUpdate) return;
            var now = new Date();
            var m = lastUpdate.match(/(\d{1,2})[:.](\d{1,2})/);
            if (!m) return;
            var h = parseInt(m[1], 10), mi = parseInt(m[2], 10);
            var d = new Date(now.getTime()); d.setHours(h, mi, 0, 0);
            if (d > now) d.setDate(d.getDate() - 1);
            var diff = Math.floor((now.getTime() - d.getTime()) / 60000);
            var el = document.getElementById('time-ago-info');
            if (diff <= 0) el.innerText = 'อัปเดตเมื่อครู่นี้';
            else if (diff < 60) el.innerText = 'อัปเดตเมื่อ ' + diff + ' นาทีที่แล้ว';
            else el.innerText = 'อัปเดตเมื่อ ' + Math.floor(diff/60) + ' ชม. ' + (diff%60) + ' นาที';
        }

        setInterval(updateClock, 1000); updateClock();
        setInterval(function() { calculateTimeAgo(); }, 30000);
        setTimeout(fetchGoldPrice, 1000);
        setInterval(fetchGoldPrice, 60000);
    </script>
</body>
</html>
