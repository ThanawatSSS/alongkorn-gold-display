<!DOCTYPE html>

<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta http-equiv="refresh" content="1800">

    <title>ร้านทองอลงกรณ์ - ราคาทองวันนี้</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #660000;
            background-image: linear-gradient(135deg, #8A0000, #2B0000);
            color: #FFFFFF;
            font-family: Arial, Helvetica, Tahoma, sans-serif;
        }

        /* Layout Wrapper - Table Display for Old TV support! */
        .main-table {
            display: table;
            width: 96%;
            height: 94%;
            margin: 2% auto;
            /* Centers the whole table horizontally with gap */
            border-spacing: 40px 0px;
            /* Creates the gap between the columns */
        }

        .main-row {
            display: table-row;
        }

        /* LEFT COLUMN */
        .left-col {
            display: table-cell;
            width: 48%;
            vertical-align: middle;
            text-align: center;
            background-color: rgba(50, 0, 0, 0.6);
            border: 5px solid #E6B800;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }

        .shop-header {
            margin-bottom: 20px;
        }

        .shop-logo {
            width: 140px;
            height: 140px;
            vertical-align: middle;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .shop-name {
            font-size: 48px;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 2px 2px 0px #400000, 3px 3px 5px rgba(0, 0, 0, 0.8);
            display: block;
        }

        /* DIFF */
        .diff-tag {
            font-size: 32px;
            margin-top: 15px;
            padding: 15px 40px;
            background-color: #330000;
            border-radius: 50px;
            border: 3px solid #E6B800;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        /* UPDATE INFO */
        #update-info {
            margin-top: 30px;
            font-size: 22px;
            color: #EEEEEE;
        }

        /* RIGHT COLUMN */
        .right-col {
            display: table-cell;
            width: 48%;
            vertical-align: middle;
        }

        .asso-card {
            display: block;
            background-color: rgba(30, 0, 0, 0.7);
            border: 4px solid #E6B800;
            border-radius: 20px;
            padding: 25px 35px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            margin-bottom: 25px;
            text-align: left;
        }

        .asso-label {
            display: block;
            font-size: 28px;
            color: #DDDDDD;
            margin-bottom: 10px;
        }

        .price-row {
            display: block;
        }

        .asso-price {
            font-size: 100px;
            color: #FFE600;
            font-weight: bold;
            line-height: 1;
            text-shadow: 3px 3px 0px #500000, 5px 5px 8px rgba(0, 0, 0, 0.9);
        }

        .asso-unit {
            font-size: 30px;
            color: #E6B800;
            margin-left: 15px;
            vertical-align: baseline;
        }

        /* STATUS FOOTER */
        .status-footer {
            display: block;
            background-color: rgba(50, 0, 0, 0.6);
            padding: 20px 30px;
            border-radius: 20px;
            overflow: hidden;
            /* Clearfix loop */
        }

        .clock-sync {
            float: left;
        }

        .clock-display {
            display: block;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #FFFFFF;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        #sync-status {
            display: block;
            font-size: 18px;
            color: #DDDDDD;
        }



        .price-up {
            color: #00FF66;
            text-shadow: 1px 1px 0px #000;
        }

        .price-down {
            color: #FF4444;
            text-shadow: 1px 1px 0px #000;
        }

        .price-equal {
            color: #FFFFFF;
            text-shadow: 1px 1px 0px #000;
        }
    </style>

</head>

<body>

    <div class="main-table">
        <div class="main-row">
            <!-- LEFT: logo + diff + update -->
            <div class="left-col">
                <div class="shop-header">
                    <img src="logo_no_bg.png" class="shop-logo" alt="Logo">
                    <div class="shop-name">ร้านทองอลงกรณ์</div>
                </div>

                <div id="diff-info" class="diff-tag">รอข้อมูล...</div>

                <div id="prev-change-info" style="font-size: 20px; color: #EEEEEE; margin-top: 15px;">เทียบรอบก่อนหน้า:
                    --</div>

                <div id="update-info" style="margin-top: 20px;"></div>

                <div id="exchange-info" style="font-size: 20px; color: #DDDDDD; margin-top: 20px;">
                    อัตราแลกเปลี่ยน USD: <strong id="usd-rate"
                        style="color: #FFE600; font-size: 24px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.6);">--</strong>
                    บาท
                </div>
            </div>

            <!-- RIGHT: asso prices + clock -->
            <div class="right-col">

                <div class="asso-card">
                    <div class="asso-label">สมาคมฯ ขายออก</div>
                    <div class="price-row">
                        <span id="asso-sell" class="asso-price">---</span>
                        <span class="asso-unit">บาท</span>
                    </div>
                </div>

                <div class="asso-card">
                    <div class="asso-label">สมาคมฯ รับซื้อ</div>
                    <div class="price-row">
                        <span id="asso-buy" class="asso-price">---</span>
                        <span class="asso-unit">บาท</span>
                    </div>
                </div>

                <div class="status-footer">
                    <div class="clock-sync">
                        <div id="clock" class="clock-display"></div>
                        <div id="sync-status"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function updateClock() {
            var d = new Date();
            var h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
            h = h < 10 ? '0' + h : h;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;
            document.getElementById('clock').innerHTML = h + ':' + m + ':' + s + ' น.';
        }
        setInterval(updateClock, 1000);
        updateClock();

        /* state กลาง */
        var latestData = null;

        function showOfflineStatus() {
            document.getElementById('sync-status').innerHTML =
                '<span style="color:#FF4444;">●</span> ออฟไลน์ (ขาดการเชื่อมต่อกับเซิร์ฟเวอร์)';
        }

        /* โหลด JSON (ระบบ JSONP เพื่อรองรับทีวีรุ่นเก่าและเลี่ยง CORS) */
        function fetchJSON(url, successCallback) {
            var callbackName = 'jsonp_' + new Date().getTime() + '_' + Math.floor(Math.random() * 1000);
            
            window[callbackName] = function (data) {
                try {
                    successCallback(data);
                } catch (e) {
                    showOfflineStatus();
                }
                // ล้างค่าหลังจากทำงานเสร็จ
                try {
                    delete window[callbackName];
                    var scriptEl = document.getElementById(callbackName);
                    if (scriptEl && scriptEl.parentNode) {
                        scriptEl.parentNode.removeChild(scriptEl);
                    }
                } catch (err) {}
            };

            var script = document.createElement('script');
            script.id = callbackName;
            
            // แนบพารามิเตอร์ callback ไปที่ URL ของ Cloudflare
            var separator = url.indexOf('?') >= 0 ? '&' : '?';
            script.src = url + separator + 'callback=' + callbackName + '&_v=' + new Date().getTime();
            
            script.onerror = function () {
                showOfflineStatus();
                try {
                    delete window[callbackName];
                    var scriptEl = document.getElementById(callbackName);
                    if (scriptEl && scriptEl.parentNode) {
                        scriptEl.parentNode.removeChild(scriptEl);
                    }
                } catch (err) {}
            };

            document.body.appendChild(script);
        }

        /* render กลาง */
        function tryRender() {
            if (!latestData) return;

            var buy = parseFloat(latestData.goldBar.buy);
            var sell = parseFloat(latestData.goldBar.sell);

            document.getElementById('asso-buy').innerText = formatNumber(buy);
            document.getElementById('asso-sell').innerText = formatNumber(sell);

            /* date + time */
            var dateStr = '';
            try {
                var parts = latestData.asTime.split('T');
                var dateParts = parts[0].split('-');
                var timeParts = parts[1].split(':');
                var BEYear = parseInt(dateParts[0]) + 543;
                var monthIndex = parseInt(dateParts[1], 10) - 1;
                var thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                var monthName = thaiMonths[monthIndex] || dateParts[1];
                dateStr = dateParts[2] + ' ' + monthName + ' ' + BEYear + ' เวลา ' + timeParts[0] + ':' + timeParts[1] + ' น. (ครั้งที่ ' + latestData.seq + ')';
            } catch (e) {
                dateStr = latestData.asTime;
            }
            document.getElementById('update-info').innerHTML = 'อัปเดต: ' + dateStr;

            /* diff */
            var diff = (latestData.change && latestData.change.fromYesterday !== undefined) ? latestData.change.fromYesterday : 0;
            var diffEl = document.getElementById('diff-info');

            if (diff > 0) {
                diffEl.innerHTML = '<span class="price-up">▲ วันนี้ขึ้น ' + formatNumber(diff) + ' บาท</span>';
            }
            else if (diff < 0) {
                diffEl.innerHTML = '<span class="price-down">▼ วันนี้ลง ' + formatNumber(Math.abs(diff)) + ' บาท</span>';
            }
            else {
                diffEl.innerHTML = '<span class="price-equal">— ราคาเท่าเมื่อวาน —</span>';
            }

            /* change from prev round */
            var prevDiff = (latestData.change && latestData.change.fromPrevRound !== undefined) ? latestData.change.fromPrevRound : 0;
            var prevEl = document.getElementById('prev-change-info');
            if (prevDiff > 0) {
                prevEl.innerHTML = 'เทียบรอบก่อนหน้า: <span class="price-up">▲ ขึ้น ' + formatNumber(prevDiff) + ' บาท</span>';
            }
            else if (prevDiff < 0) {
                prevEl.innerHTML = 'เทียบรอบก่อนหน้า: <span class="price-down">▼ ลง ' + formatNumber(Math.abs(prevDiff)) + ' บาท</span>';
            }
            else {
                prevEl.innerHTML = 'เทียบรอบก่อนหน้า: <span class="price-equal">— เท่าเดิม —</span>';
            }

            /* exchange rate */
            var usdRate = (latestData.exchange && latestData.exchange.usdThb) ? latestData.exchange.usdThb : '--';
            document.getElementById('usd-rate').innerText = usdRate;

            /* sync status */
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            h = h < 10 ? '0' + h : h;
            m = m < 10 ? '0' + m : m;

            var source = latestData.source || 'unknown';
            var sourceId = latestData.goldPriceID || '--';

            // Check if GAS data is stale (over 15 minutes)
            var isStale = false;
            if (latestData.generatedAt) {
                try {
                    var genTime = new Date(latestData.generatedAt);
                    var diffMinutes = (now.getTime() - genTime.getTime()) / 60000;
                    if (diffMinutes > 15) {
                        isStale = true;
                    }
                } catch (err) {
                    console.log('Error parsing generatedAt:', err);
                }
            }

            if (isStale) {
                document.getElementById('sync-status').innerHTML =
                    '<span style="color:#FFCC00;">●</span> ข้อมูลล่าช้า (GAS ขัดข้อง) | ดึงล่าสุด ' + h + ':' + m + ' น.';
            } else {
                document.getElementById('sync-status').innerHTML =
                    '<span style="color:#00FF00;">●</span> เชื่อมต่อล่าสุด ' + h + ':' + m + ' น. (แหล่งข้อมูล: ' + source + ' | ID: ' + sourceId + ')';
            }
        }

        /* fetch ข้อมูล */
        var GOLD_API_URL = 'https://alongkorn-gold-proxy.boomhothkub.workers.dev/';

        function fetchAll() {
            latestData = null;

            fetchJSON(GOLD_API_URL, function (data) {
                latestData = data;
                tryRender();
            });
        }

        setInterval(fetchAll, 40000);
        fetchAll();
    </script>

</body>

</html>
